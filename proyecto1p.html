
   <!DOCTYPE html>
<html>
<head>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #ffe4ec; /* rosa claro */
    }

    th {
      background-color: #ff69b4; /* rosa fuerte */
      color: white;
      padding: 10px;
    }

    td {
      border: 1px solid #ff69b4;
      padding: 10px;
      text-align: center;
    }

    tr:nth-child(even) {
      background-color: #ffd6e7; /* rosa alterno */
    }

    img {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<table>
  <tr>
    <th>ANIMALES</th>
    <th>DESCRIPCIÓN</th>
    <th>IMAGEN</th>
  </tr>

  <tr>
    <td>PANDA</td>
    <td>El panda es un oso conocido por su color blanco y negro.</td>
    <td><img src="panda.jpg" width="150"></td>
  </tr>

  <tr>
    <td>BUHO</td>
    <td>El búho es un ave nocturna con gran visión.</td>
    <td><img src="buho.jpg" width="150"></td>
  </tr>

  <tr>
    <td>RATA</td>
    <td>La rata es un roedor muy inteligente.</td>
    <td><img src="rata.jpg" width="150"></td>
  </tr>

  <tr>
    <td>SERPIENTE</td>
    <td>Las serpientes son reptiles sin patas.</td>
    <td><img src="serpiente.jpg" width="150"></td>
  </tr>

  <tr>
    <td>KOALA</td>
    <td>El koala vive en Australia y come eucalipto.</td>
    <td><img src="koala.jpg" width="150"></td>
  </tr>

</table>

</body>
</html>
